<!DOCTYPE html> 
<html lang="zh-TW"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Math Dictionary</title>
  <style>
    :root {
      --active-gray: #555555;   
      --inactive-gray: #CCCCCC; 
      --footer-bg: #EFEFEF;    
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Noto Sans TC", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #ffffff;
      min-height: 100vh;
      overflow-x: hidden; /* 防止橫向捲軸出現 */
    }

    /* --- Header 區域 --- */
    header {
      width: 100%;
      padding: 10px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-img {
      width: 120px; 
      height: auto;
    }

    /* --- 上方產品圖區域 --- */
    .product-container {
      width: 60%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    .product-side-img {
      width: 80%;
      min-height: 50vh;/*圖片最小要有螢幕的50%高度*/
      flex-shrink: 0; 
      opacity: 0.4; 
      filter: grayscale(100%); 
      object-fit: contain;
    }

    #product-image {
      width: 100%; 
      display: flex;
      flex-shrink: 0;
      z-index: 2; 
      object-fit: contain;
    }

    /* --- 文字顯示區域 --- */
    .content-section {
      width: 85%;
      margin-top: 20px;
      margin-bottom: 20px; 
      text-align: left;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 400px; 
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    #speaker-icon {
      width: 22px;
      height: 22px;
      fill: #000000;
    }

    #display-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      letter-spacing: 2px;
    }

    #display-id {
      color: #bbbbbb;
      font-size: 14px;
      margin: 10px 0;
      letter-spacing: 1px;
    }

    #display-desc {
      color: #888888;
      font-size: 15px;
      line-height: 1.8;
      margin-top: 10px;
    }

    /* --- Footer 區域 --- */
    footer {
      width: 100%;
      height: 100px;
      background-color: var(--footer-bg);
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .lang-switcher {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 35px;
    }

    .lang-btn {
      width: 45px;
      height: 45px;
      cursor: pointer;
      transition: all 0.3s ease;
      filter: grayscale(100%) opacity(0.3);
    }

    .lang-btn.active {
      filter: grayscale(0%) opacity(1);
      transform: scale(1.15);
    }

    .lang-btn:focus { outline: none; }
  </style>
</head>
<body>

  <header>
    <img src="ICON-16.png" class="logo-img" alt="Logo">
  </header>

  <div class="product-container">
    <img src="花香咖啡拿鐵-27.png" class="product-side-img" alt="Side Product">
    <img id="product-image" src="花香咖啡拿鐵-27.png" alt="Product">
    <img src="花香咖啡拿鐵-27.png" class="product-side-img" alt="Side Product">
  </div>

  <div class="content-section">
    <div class="title-row" onclick="handleSpeech()">
      <svg id="speaker-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <h1 id="display-title">花香咖啡拿鐵</h1>
    </div>
    <p id="display-id">/001</p>
    <p id="display-desc">花香揉合深邃咖啡，融入絲滑牛奶後口感柔順且層次靈動，微甜中帶有迷人氣息，綻放舒壓的午茶時光。</p>
    
    <div class="lang-switcher">
        <img src="台-黑.svg" class="lang-btn active" onclick="switchLang('tw', this)" alt="Taiwan">
        <img src="美-黑.svg" class="lang-btn" onclick="switchLang('us', this)" alt="USA">
        <img src="日-黑.svg" class="lang-btn" onclick="switchLang('jp', this)" alt="Japan">
    </div>
  </div>

  <footer></footer>

  <script>
    const langData = {
      tw: {
        title: "花香咖啡拿鐵",
        id: "/001",
        desc: "花香揉合深邃咖啡，融入絲滑牛奶後口感柔順且層次靈動，微甜中帶有迷人氣息，綻放舒壓的午茶時光。",
        voice: "zh-TW"
      },
      us: {
        title: "Floral coffee milk",
        id: "/002",
        desc: "Floral notes blend with deep coffee, and when combined with silky milk, the flavor is smooth and layered, with a subtle sweetness and a captivating aroma, perfect for a relaxing afternoon tea.",
        voice: "en-US"
      },
      jp: {
        title: "フローラルコーヒーミルク",
        id: "/003",
        desc: "フローラルな香りが濃厚なコーヒーと溶け合い、なめらかなミルクと組み合わせると、まろやかで奥深い味わいが生まれます。ほのかな甘みと魅惑的な香りが、ゆったりとした午後のティータイムにぴったりです。",
        voice: "ja-JP"
      }
    };

    let currentLang = 'tw';
    let synth = window.speechSynthesis;
    let currentUtterance = null;

    function switchLang(lang, element) {
      synth.cancel(); 
      
      currentLang = lang;
      const data = langData[lang];

      document.getElementById('display-title').innerText = data.title;
      document.getElementById('display-desc').innerText = data.desc;
      document.getElementById('display-id').innerText = data.id;
      
      const btns = document.querySelectorAll('.lang-btn');
      btns.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
    }

    function handleSpeech() {
      if (synth.speaking) {
        if (synth.paused) {
          synth.resume();
        } else {
          synth.pause();
        }
      } else {
        startSpeaking();
      }
    }

    function startSpeaking() {
      const data = langData[currentLang];
      currentUtterance = new SpeechSynthesisUtterance();
      currentUtterance.text = data.title + ". " + data.desc;
      currentUtterance.lang = data.voice;
      currentUtterance.rate = 0.95; // 微調語速讓聲音更自然

      // 語音自動篩選邏輯：優先找 Siri 或 Google 的優質語音
      const voices = synth.getVoices();
      let selectedVoice = null;

      if (data.voice === "zh-TW") {
          selectedVoice = voices.find(v => 
            v.lang.includes("zh-TW") && (v.name.includes("Siri") || v.name.includes("Google") || v.name.includes("Premium"))
          ) || voices.find(v => v.lang.includes("zh-TW"));
      } else {
          selectedVoice = voices.find(v => v.lang === data.voice);
      }

      if (selectedVoice) {
          currentUtterance.voice = selectedVoice;
      }
      
      synth.speak(currentUtterance);
    }

    // 預載入語音清單確保 getVoices 有效
    window.speechSynthesis.onvoiceschanged = () => {
      synth.getVoices();
    };
  </script>
</body>
</html>
